name: iOS → TestFlight

on:
  push:
    branches: [refactor/app-architecture-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Código fuente
      - uses: actions/checkout@v4

      # 2. Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Dependencias Flutter
      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      # 4. Build number automático (usa el número de run de GitHub)
      - name: Set build number
        working-directory: app
        run: |
          BUILD=$(( 100 + ${{ github.run_number }} ))
          sed -i '' "s/^version: .*/version: 1.0.0+$BUILD/" pubspec.yaml
          echo "Build number: $BUILD"

      # 5. Instalar certificado de distribución
      - name: Install certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain

      # 6. Instalar provisioning profile
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/okventa.mobileprovision

      # 7. Configurar firma manual en Xcode
      - name: Configure Xcode manual signing
        working-directory: app/ios
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = "";/PROVISIONING_PROFILE_SPECIFIER = "OkVenta Distribution";/g' Runner.xcodeproj/project.pbxproj

      # 8. Crear ExportOptions.plist
      - name: Create ExportOptions
        run: |
          cat > app/ios/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>ASN79QKDK7</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.okventa.app</key>
                  <string>OkVenta Distribution</string>
              </dict>
          </dict>
          PLIST

      # 9. Build IPA
      - name: Build IPA
        working-directory: app
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      # 10. Subir a TestFlight
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: app/build/ios/ipa/mercadofoto_app.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
