name: iOS → TestFlight

on:
  push:
    branches: [refactor/app-architecture-v1]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      # 1. Código fuente
      - uses: actions/checkout@v4

      # 2. Seleccionar Xcode 26 (iOS 26 SDK requerido por Apple)
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # 3. Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Caché Flutter pub
      - name: Cache Flutter pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: pub-

      # 4. Dependencias Flutter
      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      # 5. Caché CocoaPods
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: app/ios/Pods
          key: pods-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: pods-

      # 6. Build number automático
      - name: Set build number
        working-directory: app
        run: |
          BUILD=$(( 100 + ${{ github.run_number }} ))
          sed -i '' "s/^version: .*/version: 1.0.0+$BUILD/" pubspec.yaml
          echo "Build number: $BUILD"

      # 7. Instalar certificado de distribución
      - name: Install certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain

      # 8. Instalar provisioning profile y obtener UUID
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/okventa.mobileprovision
          UUID=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/okventa.mobileprovision \
            | grep -A1 '<key>UUID</key>' | grep '<string>' \
            | sed 's/.*<string>\(.*\)<\/string>/\1/' | xargs)
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "Profile UUID: $UUID"

      # 9. Inyectar firma manual SOLO en Runner
      - name: Configure Runner signing
        working-directory: app/ios
        run: |
          python3 << 'PYEOF'
          with open('Runner.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()

          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          content = content.replace('CODE_SIGN_STYLE = "Automatic";', 'CODE_SIGN_STYLE = Manual;')

          content = content.replace(
              'PRODUCT_BUNDLE_IDENTIFIER = com.okventa.app;',
              'PRODUCT_BUNDLE_IDENTIFIER = com.okventa.app;\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "OkVenta Distribution";'
          )

          with open('Runner.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)

          print("Runner signing configured")
          PYEOF

      # 10. Crear ExportOptions.plist
      - name: Create ExportOptions
        run: |
          cat > app/ios/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>ASN79QKDK7</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.okventa.app</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
          </dict>
          </plist>
          PLIST

      # 11. Build IPA (un solo paso: compila + archiva + exporta)
      - name: Disable Swift Package Manager (mantener CocoaPods)
        run: flutter config --no-enable-swift-package-manager

      - name: Build IPA
        working-directory: app
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --no-tree-shake-icons

      # 12. Subir a TestFlight
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_key.p8
          xcrun altool --upload-app \
            --type ios \
            --file app/build/ios/ipa/mercadofoto_app.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --privateKey /tmp/asc_key.p8 \
            --output-format normal
          rm /tmp/asc_key.p8
