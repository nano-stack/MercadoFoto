services:
  # ── Worker: lector de correos y publicador masivo ──────────────────────────
  - type: worker
    name: okventa-email-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python email_publisher.py
    envVars:
      - key: IMAP_SERVER
        value: mail.galmar.cl
      - key: IMAP_PORT
        value: "993"
      - key: IMAP_CARPETA
        value: INBOX
      - key: CHECK_INTERVAL
        value: "300"
      # Credenciales — cargar manualmente en el dashboard de Render
      - key: IMAP_EMAIL
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: API_URL
        sync: false
